<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EMS Central</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
    body { 
        margin: 0; 
        font-family: Arial, sans-serif; 
        display: flex; 
        background: #f0f2f5;
    }
    .sidebar { 
        width: 260px; 
        background: #2c3e50; 
        color: white; 
        height: 100vh; 
        padding: 20px; 
        display: none;
    }
    .sidebar h2 { 
        color: #00bfff; 
        text-align: center;
        margin-bottom: 30px;
    }
    .sidebar button { 
        display: block; 
        width: 100%; 
        padding: 12px; 
        margin: 8px 0; 
        border: none; 
        background: #34495e; 
        color: white; 
        text-align: left; 
        cursor: pointer; 
        border-radius: 6px;
        font-size: 15px;
    }
    .sidebar button:hover { 
        background: #00bfff; 
    }
    .main { 
        flex: 1; 
        padding: 25px; 
        overflow-y: auto;
    }
    .card { 
        background: white; 
        padding: 25px; 
        border-radius: 12px; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        margin-bottom: 25px;
    }
    button { 
        padding: 10px 15px; 
        margin: 5px; 
        border: none; 
        border-radius: 6px; 
        cursor: pointer; 
    }
    .btn { background: #3498db; color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    input { 
        width: 100%; 
        padding: 10px; 
        margin: 8px 0; 
        border: 1px solid #ddd; 
        border-radius: 6px; 
        box-sizing: border-box;
    }
    .service-item {
        padding: 10px;
        background: #f8f9fa;
        margin: 5px 0;
        border-radius: 6px;
    }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <h2>🚑 EMS Central</h2>
    <button onclick="showSection('service')">🛠️ Service</button>
    <button onclick="showSection('profile')">👤 Profil</button>
    <button onclick="showSection('users')" id="btnUsers">👥 Utilisateurs</button>
    <button onclick="showSection('admin')" id="btnAdmin">⚙️ Codes & Lieux</button>
    <button onclick="logout()">🚪 Déconnexion</button>
</div>

<div class="main">
    <div id="content"></div>
</div>

<script>
// ================= CONFIG FIREBASE =================
const firebaseConfig = {
    apiKey: "AIzaSyB_tI4S6Z3sBGuV_qrk1ILbvMxtDEfXzqU",
    authDomain: "ems-central-rp.firebaseapp.com",
    projectId: "ems-central-rp",
    storageBucket: "ems-central-rp.firebasestorage.app",
    messagingSenderId: "669746576227",
    appId: "1:669746576227:web:ba18eb315db88e49a3b156"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let isAdmin = false;
let timerInterval = null;

// ================= ÉLÉMENTS DOM =================
const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');

// ================= AUTH =================
auth.onAuthStateChanged(async (user) => {
    if (user) {
        currentUser = user;
        const userDoc = await db.collection("users").doc(user.uid).get();
        const userData = userDoc.data() || {};
        
        isAdmin = userData.role === "admin";
        
        // Afficher/masquer les boutons admin
        document.getElementById('btnUsers').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('btnAdmin').style.display = isAdmin ? 'block' : 'none';

        sidebar.style.display = "block";
        showSection('service');
    } else {
        sidebar.style.display = "none";
        showLogin();
    }
});

// ================= LOGIN =================
function showLogin() {
    content.innerHTML = `
        <div class="card" style="max-width:420px; margin: 100px auto;">
            <h2 style="text-align:center;">Connexion EMS Central</h2>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="pass" placeholder="Mot de passe" required>
            <button class="btn" style="width:100%; padding:12px;" onclick="login()">Se connecter</button>
        </div>
    `;
}

async function login() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value;

    if (!email || !pass) {
        alert("Veuillez remplir tous les champs");
        return;
    }

    try {
        await auth.signInWithEmailAndPassword(email, pass);
    } catch (e) {
        alert("Erreur de connexion : " + e.message);
    }
}

function logout() {
    if (confirm("Voulez-vous vraiment vous déconnecter ?")) {
        auth.signOut();
    }
}

// ================= NAVIGATION =================
function showSection(section) {
    if (timerInterval) clearInterval(timerInterval);

    switch(section) {
        case 'service': showService(); break;
        case 'profile': showProfile(); break;
        case 'users': if(isAdmin) showUsers(); else alert("Accès réservé aux administrateurs"); break;
        case 'admin': if(isAdmin) showAdmin(); else alert("Accès réservé aux administrateurs"); break;
    }
}

// ================= SERVICE =================
// ================= SERVICE AMÉLIORÉ =================
async function showService() {
    content.innerHTML = `
        <div class="card">
            <h2>🚑 Prise de Service</h2>
            
            <!-- Heures totales en GROS -->
            <div style="text-align:center; margin:20px 0;">
                <p style="margin:5px 0; color:#7f8c8d;">Heures totales effectuées</p>
                <h1 id="totalHours" style="font-size:48px; margin:10px 0; color:#2c3e50;">0h 00m</h1>
            </div>

            <!-- Timer du service actuel -->
            <div style="text-align:center; margin:30px 0;">
                <p id="statusText" style="font-size:18px; margin:10px 0;">Statut : Hors service</p>
                <p id="currentTimer" style="font-size:42px; font-weight:bold; color:#27ae60; margin:10px 0;">
                    00h 00m 00s
                </p>
            </div>

            <div style="text-align:center;">
                <button class="btn-success" style="font-size:18px; padding:14px 30px;" onclick="startService()">
                    ▶️ DÉMARRER LE SERVICE
                </button>
                <button class="btn-danger" style="font-size:18px; padding:14px 30px;" onclick="stopService()">
                    ⏹️ ARRÊTER LE SERVICE
                </button>
            </div>
        </div>

        <div class="card">
            <h3>Collègues actuellement en service</h3>
            <div id="colleaguesList"></div>
        </div>
    `;

    // Charger les données
    await loadTotalHours();
    await checkCurrentService();
    await loadColleagues();
}

// Charger les heures totales en gros
async function loadTotalHours() {
    try {
        const doc = await db.collection("users").doc(currentUser.uid).get();
        const hours = doc.data()?.heuresTotales || 0;
        document.getElementById('totalHours').textContent = formatTime(hours);
    } catch (e) {
        console.error(e);
    }
}

// Vérifier et afficher le timer si en service
async function checkCurrentService() {
    const doc = await db.collection("service").doc(currentUser.uid).get();
    const timerEl = document.getElementById('currentTimer');
    const statusEl = document.getElementById('statusText');

    if (!doc.exists) {
        timerEl.textContent = "00h 00m 00s";
        timerEl.style.color = "#95a5a6";
        statusEl.textContent = "Statut : Hors service";
        statusEl.style.color = "#7f8c8d";
        return;
    }

    const start = doc.data().start;

    if (timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        const diff = Date.now() - start;
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        timerEl.textContent = `${h.toString().padStart(2,'0')}h ${m.toString().padStart(2,'0')}m ${s.toString().padStart(2,'0')}s`;
        timerEl.style.color = "#27ae60";
        statusEl.textContent = "Statut : En service";
        statusEl.style.color = "#27ae60";
    }, 1000);
}

// ================= COLLÈGUES EN SERVICE =================
async function loadColleagues() {
    const snap = await db.collection("service").get();
    const listEl = document.getElementById('colleaguesList');

    if (snap.empty) {
        listEl.innerHTML = "<p>Aucun collègue en service actuellement.</p>";
        return;
    }

    let html = "";
    for (const doc of snap.docs) {
        const userSnap = await db.collection("users").doc(doc.id).get();
        const user = userSnap.data() || {};
        html += `<div class="service-item">🟢 ${user.nom || "Inconnu"} - ${user.grade || ""}</div>`;
    }
    listEl.innerHTML = html;
}

// ================= PROFIL =================
async function showProfile() {
    const doc = await db.collection("users").doc(currentUser.uid).get();
    const d = doc.data() || {};

    content.innerHTML = `
        <div class="card">
            <h2>Mon Profil</h2>
            <p><strong>Nom :</strong> ${d.nom || "Non défini"}</p>
            <p><strong>Grade :</strong> ${d.grade || "Aucun"}</p>
            <p><strong>Heures totales :</strong> ${formatTime(d.heuresTotales || 0)}</p>
            <p><strong>Email :</strong> ${currentUser.email}</p>
        </div>
    `;
}

function formatTime(hours) {
    if (!hours || hours === 0) return "0h 00m";
    const h = Math.floor(hours);
    const m = Math.floor((hours - h) * 60);
    return `${h}h ${m.toString().padStart(2, '0')}m`;
}

// ================= UTILISATEURS (ADMIN) =================
async function showUsers() {
    if (!isAdmin) return;

    const snap = await db.collection("users").get();
    let html = `
        <div class="card">
            <h2>Gestion des Utilisateurs</h2>
            <h3>Créer un nouvel utilisateur</h3>
            <input id="newEmail" placeholder="Email" type="email">
            <input id="newPass" placeholder="Mot de passe" type="password">
            <input id="newNom" placeholder="Nom complet">
            <input id="newGrade" placeholder="Grade (ex: Médecin, Infirmier...)">
            <button class="btn" onclick="createUser()">Créer l'utilisateur</button>
        </div>
    `;

    snap.forEach(doc => {
        const u = doc.data();
        html += `
            <div class="card">
                <strong>${u.nom || "Sans nom"}</strong> (${u.email || ""}) - ${u.grade || ""}
                <br><br>
                <input id="nom_${doc.id}" value="${u.nom || ''}" placeholder="Nom">
                <button onclick="updateField('${doc.id}', 'nom')">Modifier Nom</button>

                <input id="grade_${doc.id}" value="${u.grade || ''}" placeholder="Grade">
                <button onclick="updateField('${doc.id}', 'grade')">Modifier Grade</button>

                <input id="heure_${doc.id}" value="${u.heuresTotales || 0}" type="number" step="0.01">
                <button onclick="updateField('${doc.id}', 'heuresTotales')">Modifier Heures</button>

                <button class="btn-danger" onclick="deleteUser('${doc.id}')">Supprimer</button>
            </div>
        `;
    });

    content.innerHTML = html;
}

async function createUser() {
    const email = document.getElementById('newEmail').value.trim();
    const pass = document.getElementById('newPass').value;
    const nom = document.getElementById('newNom').value.trim();
    const grade = document.getElementById('newGrade').value.trim();

    if (!email || !pass || !nom || !grade) {
        alert("Tous les champs sont obligatoires !");
        return;
    }

    try {
        const adminEmail = currentUser.email;
        const adminPass = prompt("Confirmez votre mot de passe admin pour continuer :");

        const userCred = await auth.createUserWithEmailAndPassword(email, pass);

        await db.collection("users").doc(userCred.user.uid).set({
            nom: nom,
            grade: grade,
            heuresTotales: 0,
            role: "user",
            email: email
        });

        alert(`Utilisateur ${nom} créé avec succès !`);

        // Reconnexion de l'admin
        await auth.signOut();
        await auth.signInWithEmailAndPassword(adminEmail, adminPass);
        
        showUsers();
    } catch (e) {
        alert("Erreur lors de la création : " + e.message);
    }
}

async function updateField(id, field) {
    let value;
    if (field === 'heuresTotales') {
        value = parseFloat(document.getElementById('heure_' + id).value);
        if (isNaN(value)) value = 0;
    } else {
        value = document.getElementById(field + '_' + id).value.trim();
    }

    await db.collection("users").doc(id).update({ [field]: value });
    alert("Mise à jour effectuée !");
}

async function deleteUser(id) {
    if (confirm("Voulez-vous vraiment supprimer cet utilisateur ?")) {
        await db.collection("users").doc(id).delete();
        showUsers();
    }
}

// ================= ADMIN - CODES & LIEUX =================
function showAdmin() {
    content.innerHTML = `
        <div class="card">
            <h2>Gestion des Codes</h2>
            <input id="newCode" placeholder="Nouveau code (ex: 10-4)">
            <button class="btn" onclick="addCode()">Ajouter Code</button>
            <div id="codesList" style="margin-top:15px;"></div>
        </div>

        <div class="card">
            <h2>Gestion des Lieux</h2>
            <input id="newLieu" placeholder="Nouveau lieu (ex: Hôpital Central)">
            <button class="btn" onclick="addLieu()">Ajouter Lieu</button>
            <div id="lieuxList" style="margin-top:15px;"></div>
        </div>
    `;

    loadCodes();
    loadLieux();
}

async function addCode() {
    const name = document.getElementById('newCode').value.trim();
    if (!name) return alert("Veuillez entrer un code");
    
    await db.collection("codes").add({ name });
    loadCodes();
}

async function loadCodes() {
    const snap = await db.collection("codes").get();
    let html = "";
    snap.forEach(doc => {
        html += `<p>${doc.data().name} <button class="btn-danger" onclick="deleteCode('${doc.id}')">Supprimer</button></p>`;
    });
    document.getElementById('codesList').innerHTML = html || "<p>Aucun code enregistré.</p>";
}

async function deleteCode(id) {
    if (confirm("Supprimer ce code ?")) {
        await db.collection("codes").doc(id).delete();
        loadCodes();
    }
}

// Lieux (identique)
async function addLieu() {
    const name = document.getElementById('newLieu').value.trim();
    if (!name) return alert("Veuillez entrer un lieu");
    
    await db.collection("lieux").add({ name });
    loadLieux();
}

async function loadLieux() {
    const snap = await db.collection("lieux").get();
    let html = "";
    snap.forEach(doc => {
        html += `<p>${doc.data().name} <button class="btn-danger" onclick="deleteLieu('${doc.id}')">Supprimer</button></p>`;
    });
    document.getElementById('lieuxList').innerHTML = html || "<p>Aucun lieu enregistré.</p>";
}

async function deleteLieu(id) {
    if (confirm("Supprimer ce lieu ?")) {
        await db.collection("lieux").doc(id).delete();
        loadLieux();
    }
}
</script>
</body>
</html>
