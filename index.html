<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EMS Central</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        background: #f0f2f5;
    }
    .sidebar {
        width: 260px;
        background: #2c3e50;
        color: white;
        height: 100vh;
        padding: 20px;
        display: none;
    }
    .sidebar h2 {
        color: #00bfff;
        text-align: center;
        margin-bottom: 30px;
    }
    .sidebar button {
        display: block;
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border: none;
        background: #34495e;
        color: white;
        text-align: left;
        cursor: pointer;
        border-radius: 6px;
        font-size: 15px;
    }
    .sidebar button:hover {
        background: #00bfff;
    }
    .main {
        flex: 1;
        padding: 25px;
        overflow-y: auto;
    }
    .card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        margin-bottom: 25px;
    }
    button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
    .btn { background: #3498db; color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
    }
    .service-item {
        padding: 10px;
        background: #f8f9fa;
        margin: 5px 0;
        border-radius: 6px;
    }
    #serviceBtn {
        padding: 18px 40px;
        font-size: 20px;
        font-weight: bold;
        border-radius: 10px;
    }
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
    <h2>🚑 EMS Central</h2>
    <button onclick="showSection('service')">🛠️ Service</button>
    <button onclick="showSection('profile')">👤 Profil</button>
    <button onclick="showSection('users')" id="btnUsers">👥 Utilisateurs</button>
    <button onclick="showSection('admin')" id="btnAdmin">⚙️ Codes & Lieux</button>
    <button onclick="logout()">🚪 Déconnexion</button>
</div>
<div class="main">
    <div id="content"></div>
</div>

<script>
// ================= CONFIG FIREBASE =================
const firebaseConfig = {
    apiKey: "AIzaSyB_tI4S6Z3sBGuV_qrk1ILbvMxtDEfXzqU",
    authDomain: "ems-central-rp.firebaseapp.com",
    projectId: "ems-central-rp",
    storageBucket: "ems-central-rp.firebasestorage.app",
    messagingSenderId: "669746576227",
    appId: "1:669746576227:web:ba18eb315db88e49a3b156"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let isAdmin = false;
let timerInterval = null;

const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');

// ================= AUTH =================
auth.onAuthStateChanged(async (user) => {
    if (user) {
        currentUser = user;
        const userDoc = await db.collection("users").doc(user.uid).get();
        isAdmin = (userDoc.data() || {}).role === "admin";
       
        document.getElementById('btnUsers').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('btnAdmin').style.display = isAdmin ? 'block' : 'none';
        sidebar.style.display = "block";
        showSection('service');
    } else {
        sidebar.style.display = "none";
        showLogin();
    }
});

// ================= LOGIN & LOGOUT =================
function showLogin() {
    content.innerHTML = `
        <div class="card" style="max-width:420px; margin: 100px auto;">
            <h2 style="text-align:center;">Connexion EMS Central</h2>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="pass" placeholder="Mot de passe" required>
            <button class="btn" style="width:100%; padding:12px;" onclick="login()">Se connecter</button>
        </div>
    `;
}

async function login() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value;
    if (!email || !pass) return alert("Veuillez remplir tous les champs");
    try {
        await auth.signInWithEmailAndPassword(email, pass);
    } catch (e) {
        alert("Erreur de connexion : " + e.message);
    }
}

function logout() {
    if (confirm("Voulez-vous vraiment vous déconnecter ?")) auth.signOut();
}

// ================= NAVIGATION =================
function showSection(section) {
    if (timerInterval) clearInterval(timerInterval);
    switch(section) {
        case 'service': showService(); break;
        case 'profile': showProfile(); break;
        case 'users': isAdmin ? showUsers() : alert("Accès réservé aux administrateurs"); break;
        case 'admin': isAdmin ? showAdmin() : alert("Accès réservé aux administrateurs"); break;
    }
}

// ================= SERVICE =================
async function loadTotalHours() {
    const doc = await db.collection("users").doc(currentUser.uid).get();
    const hours = doc.exists ? (doc.data().heuresTotales || 0) : 0;
    const el = document.getElementById('totalHours');
    if (el) el.textContent = formatTime(hours);
}

async function showService() {
    content.innerHTML = `
        <div class="card">
            <h2>Prise de Service</h2>
            <div style="text-align:center; margin:15px 0; background: #f8f9fa; padding: 15px; border-radius: 10px;">
                <p style="margin:0; color:#7f8c8d; font-size: 14px;">Mes heures totales</p>
                <h1 id="totalHours" style="font-size:40px; margin:5px 0; color:#2c3e50;">0h 00m</h1>
            </div>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <p id="timer" style="font-size:28px; font-weight:bold; color:#7f8c8d; text-align:center;">⏱️ Hors service</p>
            
            <div style="text-align:center; margin: 30px 0;">
                <button id="serviceBtn" class="btn-success" onclick="toggleService()">
                    ▶️ Démarrer le service
                </button>
            </div>
        </div>

        <div class="card">
            <h3>Collègues en service</h3>
            <div id="colleaguesList"></div>
        </div>
    `;

    loadTotalHours();
    loadColleagues();
    checkCurrentService();
}

async function toggleService() {
    const serviceRef = db.collection("service").doc(currentUser.uid);
    const doc = await serviceRef.get();
    if (doc.exists) {
        await stopService();
    } else {
        await startService();
    }
}

async function startService() {
    try {
        await db.collection("service").doc(currentUser.uid).set({
            start: Date.now(),
            userId: currentUser.uid
        });
        checkCurrentService();
    } catch (e) {
        alert("Erreur : " + e.message);
    }
}

async function stopService() {
    if (timerInterval) clearInterval(timerInterval);

    const serviceRef = db.collection("service").doc(currentUser.uid);
    const doc = await serviceRef.get();
    if (!doc.exists) return;

    const startTime = doc.data().start;
    const durationHours = (Date.now() - startTime) / 3600000;

    // Mise à jour des heures
    const userRef = db.collection("users").doc(currentUser.uid);
    const userDoc = await userRef.get();
    const currentHours = userDoc.data()?.heuresTotales || 0;

    await userRef.update({
        heuresTotales: currentHours + durationHours
    });

    await serviceRef.delete();

    alert(`Service terminé !\nDurée ajoutée : ${durationHours.toFixed(2)} heures`);

    // ACTUALISATION IMMÉDIATE
    await loadTotalHours();
    checkCurrentService();
}

async function checkCurrentService() {
    const doc = await db.collection("service").doc(currentUser.uid).get();
    const timerEl = document.getElementById('timer');
    const btn = document.getElementById('serviceBtn');

    if (!doc.exists) {
        timerEl.innerHTML = `⏱️ Hors service`;
        timerEl.style.color = "#7f8c8d";
        btn.className = "btn-success";
        btn.innerHTML = `▶️ Démarrer le service`;
        return;
    }

    const start = doc.data().start;
    if (timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        const diff = Date.now() - start;
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        timerEl.innerHTML = `⏱️ ${h}h ${m.toString().padStart(2,'0')}m ${s.toString().padStart(2,'0')}s`;
        timerEl.style.color = "#27ae60";
    }, 1000);

    btn.className = "btn-danger";
    btn.innerHTML = `⏹️ Terminer le service`;
}

// ================= COLLÈGUES =================
async function loadColleagues() {
    const snap = await db.collection("service").get();
    const listEl = document.getElementById('colleaguesList');
    if (snap.empty) {
        listEl.innerHTML = "<p>Aucun collègue en service actuellement.</p>";
        return;
    }
    let html = "";
    for (const doc of snap.docs) {
        const userSnap = await db.collection("users").doc(doc.id).get();
        const u = userSnap.data() || {};
        html += `<div class="service-item">🟢 ${u.nom || "Inconnu"} - ${u.grade || ""}</div>`;
    }
    listEl.innerHTML = html;
}

// ================= PROFIL =================
async function showProfile() {
    const doc = await db.collection("users").doc(currentUser.uid).get();
    const d = doc.data() || {};
    content.innerHTML = `
        <div class="card">
            <h2>Mon Profil</h2>
            <p><strong>Nom :</strong> ${d.nom || "Non défini"}</p>
            <p><strong>Grade :</strong> ${d.grade || "Aucun"}</p>
            <p><strong>Heures totales :</strong> ${formatTime(d.heuresTotales || 0)}</p>
            <p><strong>Email :</strong> ${currentUser.email}</p>
        </div>
    `;
}

function formatTime(hours) {
    if (!hours) return "0h 00m";
    const h = Math.floor(hours);
    const m = Math.floor((hours - h) * 60);
    return `${h}h ${m.toString().padStart(2, '0')}m`;
}

async function addLieu() { /* ... */ }
async function loadLieux() { /* ... */ }
async function deleteLieu(id) { /* ... */ }
</script>
</body>
</html>
